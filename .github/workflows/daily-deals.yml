name: Daily Price Check

on:
  schedule:
    # Run at 10:00 PM PT (06:00 UTC) every day
    # Takes ~5-7 hours with offers data, finishes by 3-5am PT
    - cron: '0 6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      full_scan:
        description: 'Check all products including long-unavailable ones'
        required: false
        type: boolean
        default: false

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check all products (Keepa API)
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
        run: |
          # Full scan on Sundays (day 0) or when manually requested
          DAY_OF_WEEK=$(date -u +%w)
          if [ "$DAY_OF_WEEK" = "0" ] || [ "${{ inputs.full_scan }}" = "true" ]; then
            echo "Running full scan (including long-unavailable products)"
            python check_deals.py --full-scan
          else
            python check_deals.py
          fi

      - name: Generate catalog data
        run: |
          python generate_catalog_data.py

      - name: Commit updated deals data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add catalog/deals.json catalog/unavailable_tracking.json public/catalog-data.json
          git diff --staged --quiet || git commit -m "Update deal prices for all products

          🤖 Automated daily price check"
          git push

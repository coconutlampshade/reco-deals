name: Daily Price Check

on:
  schedule:
    # Run at 3:30 AM PT (11:30 UTC) every day
    # Takes ~2.5 hours to check all products, finishes by ~6am PT
    - cron: '30 11 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check all products (Keepa API)
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
        run: |
          python check_deals.py

      - name: Commit updated deals data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add catalog/deals.json
          git diff --staged --quiet || git commit -m "Update deal prices for all products

          🤖 Automated daily price check"
          git push

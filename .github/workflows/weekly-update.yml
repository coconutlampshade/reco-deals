name: Daily Catalog Update

on:
  schedule:
    # Run at 8:00 PM PT (04:00 UTC) every day — before daily price check at 06:00 UTC
    - cron: '0 4 * * *'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch new products from Cool Tools newsletter
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
        run: |
          python fetch_cooltools_campaigns.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet catalog/products.json catalog/processed_campaigns.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new products found"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New products added!"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add catalog/products.json catalog/processed_campaigns.json
          git commit -m "Add products from Cool Tools newsletter

          Automated daily catalog update"
          git pull --rebase
          git push
